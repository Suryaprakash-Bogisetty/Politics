version: "3.9"

services:
  ap-pulse:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ap-pulse
    ports:
      - "5000:5000"
    env_file:
      - backend/.env
    volumes:
      # Hot-reload backend code without rebuilding image
      - ./backend:/app/backend
      - ./ui:/app/ui
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
